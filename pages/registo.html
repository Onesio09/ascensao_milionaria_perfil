<section class="hero">

<div class="badge">
ÁREA DE MEMBROS
</div>

<h1>
Criar Conta
</h1>

<div class="card" style="max-width:420px; margin-top:30px; text-align:left;">

<p id="erro-form" style="display:none; color:#ff6b6b; margin-bottom:15px;"></p>

<label for="nome" style="display:block; margin-bottom:6px; color:var(--gray);">Nome</label>
<input type="text" id="nome" placeholder="O teu nome"
style="width:100%; padding:12px; margin-bottom:18px; border-radius:8px; border:1px solid rgba(255,215,0,.2); background:#0B0B0B; color:#fff;">

<label for="email" style="display:block; margin-bottom:6px; color:var(--gray);">Email</label>
<input type="email" id="email" placeholder="o-teu-email@exemplo.com"
style="width:100%; padding:12px; margin-bottom:18px; border-radius:8px; border:1px solid rgba(255,215,0,.2); background:#0B0B0B; color:#fff;">

<label for="password" style="display:block; margin-bottom:6px; color:var(--gray);">Palavra-passe</label>
<input type="password" id="password" placeholder="Mínimo 6 caracteres"
style="width:100%; padding:12px; margin-bottom:24px; border-radius:8px; border:1px solid rgba(255,215,0,.2); background:#0B0B0B; color:#fff;">

<button onclick="registarUtilizador(document.getElementById('email').value, document.getElementById('password').value, document.getElementById('nome').value)"
class="botao-principal" style="width:100%; border:none; cursor:pointer; margin-bottom:12px;">
Criar Conta
</button>

<button onclick="loginComGoogle()"
class="botao-secundario" style="width:100%; border:none; cursor:pointer; background:transparent;">
Registar com Google
</button>

<p style="margin-top:20px; text-align:center; color:var(--gray); font-size:14px;">
Já tens conta? <a href="login.html" style="color:var(--gold);">Entra aqui</a>
</p>

</div>

</section>

<script type="module" src="../firebase-config.js"></script>
<script type="module" src="../auth.js"></script>

</body>

</html>
